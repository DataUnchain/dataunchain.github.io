<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataUnchain — Animation Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0D0D0F;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: system-ui, sans-serif;
    gap: 24px;
    padding: 40px;
  }
  h1 {
    color: #5EEAD4;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.6;
  }
  .animation-wrapper {
    width: 100%;
    max-width: 900px;
    border-radius: 24px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
    background: #0D0D0F;
  }
  .animation-wrapper img,
  .animation-wrapper object {
    width: 100%;
    height: auto;
    display: block;
  }
  p {
    color: #71717A;
    font-size: 12px;
    text-align: center;
  }
  code {
    background: #18181B;
    color: #5EEAD4;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
  }
</style>
</head>
<body>
  <h1>DataUnchain — Pipeline Animation Preview</h1>
  <div class="animation-wrapper">
    <img src="pipeline-animation.svg" alt="DataUnchain pipeline animation"/>
  </div>
  <p>
    File SVG: <code>assets/animations/pipeline-animation.svg</code><br><br>
    Per incorporare nella pagina usa:<br>
    <code>&lt;img src="/assets/animations/pipeline-animation.svg" alt="..."&gt;</code><br>
    oppure inline con <code>&lt;object&gt;</code> per mantenere le animazioni in tutti i browser.
  </p>
</body>
</html>
