faq:
  - question: "Devo avere un cloud per usare DataUnchain?"
    answer: "No. DataUnchain è una AI Appliance, un ecosistema hardware e software che viene installato direttamente nella tua infrastruttura aziendale."
  - question: "Ha bisogno di accesso a internet?"
    answer: "No. DataUnchain funziona 100% offline, ideale per ambienti air-gapped o con severe policy sulla privacy."
  - question: "Che tipo di documenti gestisce?"
    answer: "Fatture, contratti, bolle doganali, referti medici in formati PDF, JPG, PNG e TIFF. Può elaborare documenti strutturati, non strutturati o compilati a mano."
  - question: "I numeri estratti sono affidabili?"
    answer: "A differenza della normale AI generativa, DataUnchain integra un layer di verifica Python che esegue controlli matematici e di coerenza sui dati prima di procedere all'esportazione verso il gestionale. Segnalando eventuali anomalie per il fallback manuale, minimizza drasticamente il margine di errore."
  - question: "Come impara a leggere i documenti dei miei fornitori?"
    answer: "DataUnchain dispone di un sistema di apprendimento progressivo: più documenti elabora, più impara ad identificare i pattern ricorrenti dei tuoi fornitori per specifiche fatture e DDT, personalizzandosi sui processi reali dell'azienda."

